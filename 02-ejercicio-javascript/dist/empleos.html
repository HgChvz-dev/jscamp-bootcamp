
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="empleos" content="">
    <title>DevJobs - Empleos</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="module" src="./main.js"></script>
</head>
<body>
    <header>
        <h1>
            <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
            DevJobs
        </h1>
        <nav class="nav-pages">
            <a href="index.html">Buscar</a>
            <a href="#" aria-current="page">Empleos</a>
            <a href="#">Empresas</a>
            <a href="#">Salarios</a>
        </nav>

        <div class="header-left">
            <button class="btn-secundary">Subir CV</button>
            <devjobs-avatar service="github" username="hgchvz" size="32"></devjobs-avatar>
        </div>
    </header>
    <main>
        <section>
            <h1>Encuentra tu proximo trabajo</h1>
            <p>Explora miles de oportunidades en el sector tecnológico</p>
            <form role="search">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-search"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" /><path d="M21 21l-6 -6" /></svg>
                <input id="jobs-search-input" type="text" placeholder="Buscar trabajos, empresas o habilidades">
            </form>
            <div class="search-filters">
               <Select id="front-filter" name="technology-frontend">
                    <option value="">Tecnologías Frontend</option>          
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="javascript">JavaScript</option>
                    <option value="react">React</option>
                    <option value="vue">Vue</option>
                </Select>
                <Select id="back-filter" name="technology-backend">
                    <option value="">Tecnologías Backend</option>          
                    <option value="node">Node.js</option>
                    <option value="python">Python</option>
                    <option value="php">PHP</option>
                    <option value="java">Java</option>
                </Select>
                <Select id="db-filter" name="technology-db">
                    <option value="">Tecnologías base de datos</option>          
                    <option value="mysql">MySQL</option>
                    <option value="mongodb">MongoDB</option>
                    <option value="postgresql">PostgreSQL</option>
                </Select>
                <Select id="location-filter" name="location">
                    <option value="">Todas las ubicaciones</option>
                    <optgroup label="España">
                      <option value="madrid">Madrid</option>
                      <option value="barcelona">Barcelona</option>
                      <option value="valencia">Valencia</option>
                    </optgroup>
                
                    <optgroup label="México">
                      <option value="cdmx">Ciudad de México</option>
                      <option value="monterrey">Monterrey</option>
                      <option value="guadalajara">Guadalajara</option>
                    </optgroup>

                    <optgroup label="Latinoamérica">
                        <option value="bogota">Bogotá</option>
                        <option value="bsas">Buenos Aires</option>
                        <option value="lima">Lima</option>
                        <option value="santiago">Santiago de Chile</option>
                    </optgroup>

                    <hr>
                
                    <option value="remoto">Remoto</option>
                </Select>
                <Select id="contract-filter" name="contract">
                       <option value="">Tipo de contrato</option>
                       <option value="jornada-completa">Jornada completa</option>
                       <option value="medio-tiempo">Medio tiempo</option>
                       <option value="por-hora">Por hora</option>
                </Select>
                <Select id="level-filter" name="experience">
                       <option value="">Nivel de experiencia</option>
                       <option value="junior">Junior</option>
                       <option value="mid-level">Mid-level</option>
                       <option value="senior">Senior</option>
                       <option value="lead">Lead</option>
                </Select>
            </div>
        </section>

        <section class="results-jobs">
            <h2>Resultados de búsqueda</h2>
            <ul class="jobs-listings">
                <!-- Aca se insertan las tarjetas de empleo -->
            </ul>

            <nav class="pagination">
                <a href="#" title="Ir a la primera página" aria-label="Ir a la primera página">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-chevron-left-pipe">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <path d="M7 6v12" /><path d="M18 6l-6 6l6 6" />
                    </svg>
                </a>
                <a href="#" title="Ir a la página anterior" aria-label="Ir a la página anterior">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M15 6l-6 6l6 6" />
                    </svg>
                </a>
                <a href="#">1</a>
                <a href="#">2</a>
                <a href="#">3</a>
                <a class="is-active" href="#">4</a>
                <a href="#">5</a>
                <a href="#">6</a>
                <a href="#">7</a>
                <a href="#" title="Ir a la página siguiente" aria-label="Ir a la página siguiente">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-chevron-right">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M9 6l6 6l-6 6" />
                    </svg>
                </a>
                <a href="#" title="Ir a la última página" aria-label="Ir a la última página">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-chevron-right-pipe">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <path d="M6 6l6 6l-6 6" /><path d="M17 5v13" />
                    </svg>
                </a>
            </nav>
        </section>
    </main>
    <footer>
        <small>&copy; 2026 DevJobs. Todos los derechos reservados</small>
    </footer>
</body>
</html>
